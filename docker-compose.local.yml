services:
  clawbrain-api:
    ports:
      - ${CLAWBRAIN_LOCAL_API_BIND:-127.0.0.1:18088}:8000
    volumes:
      - ${CLAWBRAIN_LOCAL_DATA_ROOT:-./.local/data}:/data/clawbrain

  runner-coder:
    image: clawbrain-runner:local-dev
    build:
      context: .
      dockerfile: runner/Dockerfile.local
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAWBRAIN_COMMAND_TIMEOUT_SEC: ${CLAWBRAIN_COMMAND_TIMEOUT_SEC:-600}
    volumes:
      - ${CLAWBRAIN_LOCAL_PROJECTS_ROOT:-./.local/projects}:/srv/projects
      - ${CLAWBRAIN_LOCAL_REPO_ROOT:-.}:/srv/projects/${CLAWBRAIN_LOCAL_BRAIN_REPO_NAME:-clawbraints}
      - ${CLAWBRAIN_LOCAL_DEMO_ROOT:-./.local/projects/demo}:/srv/projects/demo
      - ${CLAWBRAIN_LOCAL_DATA_ROOT:-./.local/data}:/data/clawbrain
      - ${CLAWBRAIN_LOCAL_CODEX_AUTH_DIR:-./.local/codex-auth}:/home/codex/.codex

  runner-builder:
    image: clawbrain-runner:local-dev
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAWBRAIN_COMMAND_TIMEOUT_SEC: ${CLAWBRAIN_COMMAND_TIMEOUT_SEC:-600}
    volumes:
      - ${CLAWBRAIN_LOCAL_PROJECTS_ROOT:-./.local/projects}:/srv/projects
      - ${CLAWBRAIN_LOCAL_REPO_ROOT:-.}:/srv/projects/${CLAWBRAIN_LOCAL_BRAIN_REPO_NAME:-clawbraints}
      - ${CLAWBRAIN_LOCAL_DEMO_ROOT:-./.local/projects/demo}:/srv/projects/demo
      - ${CLAWBRAIN_LOCAL_DATA_ROOT:-./.local/data}:/data/clawbrain
      - ${CLAWBRAIN_LOCAL_CODEX_AUTH_DIR:-./.local/codex-auth}:/home/builder/.codex

  runner-ux:
    image: clawbrain-runner:local-dev
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAWBRAIN_COMMAND_TIMEOUT_SEC: ${CLAWBRAIN_COMMAND_TIMEOUT_SEC:-600}
    volumes:
      - ${CLAWBRAIN_LOCAL_PROJECTS_ROOT:-./.local/projects}:/srv/projects
      - ${CLAWBRAIN_LOCAL_REPO_ROOT:-.}:/srv/projects/${CLAWBRAIN_LOCAL_BRAIN_REPO_NAME:-clawbraints}
      - ${CLAWBRAIN_LOCAL_DEMO_ROOT:-./.local/projects/demo}:/srv/projects/demo
      - ${CLAWBRAIN_LOCAL_DATA_ROOT:-./.local/data}:/data/clawbrain
      - ${CLAWBRAIN_LOCAL_CODEX_AUTH_DIR:-./.local/codex-auth}:/home/builder/.codex

  runner-mobile:
